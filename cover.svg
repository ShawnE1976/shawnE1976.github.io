<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1530"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Glow blobs -->
  <ellipse cx="640" cy="360" rx="500" ry="300" fill="url(#glowBlue)"/>
  <ellipse cx="300" cy="500" rx="300" ry="200" fill="url(#glowPurple)"/>

  <!-- Star field -->
  <g fill="white" opacity="0.6">
    <circle cx="120" cy="80" r="1.2"/><circle cx="340" cy="45" r="0.8"/><circle cx="580" cy="100" r="1"/>
    <circle cx="750" cy="60" r="1.4"/><circle cx="900" cy="90" r="0.9"/><circle cx="1100" cy="50" r="1.1"/>
    <circle cx="1200" cy="130" r="0.7"/><circle cx="60" cy="200" r="1"/><circle cx="200" cy="300" r="0.8"/>
    <circle cx="1050" cy="200" r="1.2"/><circle cx="1180" cy="280" r="0.9"/><circle cx="80" cy="420" r="1"/>
    <circle cx="150" cy="550" r="0.8"/><circle cx="1150" cy="450" r="1.1"/><circle cx="1220" cy="600" r="0.7"/>
    <circle cx="400" cy="650" r="0.9"/><circle cx="900" cy="680" r="1"/><circle cx="700" cy="30" r="0.8"/>
    <circle cx="450" cy="200" r="0.7"/><circle cx="820" cy="150" r="1"/><circle cx="980" cy="350" r="0.8"/>
    <circle cx="1080" cy="580" r="0.9"/><circle cx="250" cy="680" r="1"/><circle cx="600" cy="700" r="0.7"/>
  </g>

  <!-- Globe outline -->
  <circle cx="640" cy="360" r="220" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="640" cy="360" r="220" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2" stroke-dasharray="6,4"/>

  <!-- Globe latitude lines -->
  <ellipse cx="640" cy="360" rx="220" ry="70" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="640" cy="360" rx="220" ry="140" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="420" y1="360" x2="860" y2="360" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="640" y1="140" x2="640" y2="580" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>

  <!-- Globe longitude arcs (approximated) -->
  <ellipse cx="640" cy="360" rx="110" ry="220" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.15"/>
  <ellipse cx="640" cy="360" rx="55" ry="220" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.12"/>

  <!-- Sighting dots on globe -->
  <circle cx="560" cy="310" r="5" fill="#f59e0b" filter="url(#glow)" opacity="0.9"/>
  <circle cx="620" cy="290" r="4" fill="#ef4444" filter="url(#glow)" opacity="0.9"/>
  <circle cx="680" cy="330" r="6" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="720" cy="300" r="4" fill="#22c55e" filter="url(#glow)" opacity="0.9"/>
  <circle cx="590" cy="380" r="5" fill="#f59e0b" filter="url(#glow)" opacity="0.9"/>
  <circle cx="660" cy="400" r="4" fill="#ef4444" filter="url(#glow)" opacity="0.9"/>
  <circle cx="700" cy="370" r="5" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <circle cx="540" cy="350" r="4" fill="#22c55e" filter="url(#glow)" opacity="0.9"/>
  <circle cx="750" cy="420" r="3" fill="#f59e0b" filter="url(#glow)" opacity="0.8"/>
  <circle cx="510" cy="420" r="3" fill="#00d4ff" filter="url(#glow)" opacity="0.8"/>
  <circle cx="640" cy="450" r="4" fill="#ef4444" filter="url(#glow)" opacity="0.8"/>
  <circle cx="600" cy="260" r="3" fill="#22c55e" filter="url(#glow)" opacity="0.8"/>

  <!-- Pulse ring on main dot -->
  <circle cx="680" cy="330" r="14" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="680" cy="330" r="22" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>

  <!-- Connection lines between dots -->
  <line x1="560" y1="310" x2="620" y2="290" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="620" y1="290" x2="680" y2="330" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="680" y1="330" x2="720" y2="300" stroke="#00d4ff" stroke-width="0.6" opacity="0.25"/>
  <line x1="590" y1="380" x2="660" y2="400" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>
  <line x1="680" y1="330" x2="700" y2="370" stroke="#00d4ff" stroke-width="0.6" opacity="0.25"/>

  <!-- Main title -->
  <text x="640" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900"
    fill="#00d4ff" text-anchor="middle" filter="url(#softglow)" letter-spacing="6">PHENOMAP</text>
  <text x="640" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900"
    fill="#00d4ff" text-anchor="middle" letter-spacing="6">PHENOMAP</text>

  <!-- Subtitle -->
  <text x="640" y="192" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400"
    fill="#94a3b8" text-anchor="middle" letter-spacing="4">GLOBAL UAP SIGHTING DATABASE</text>

  <!-- Divider line -->
  <line x1="440" y1="210" x2="840" y2="210" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="640" y="620" font-family="'Segoe UI', Arial, sans-serif" font-size="18"
    fill="#7c3aed" text-anchor="middle" letter-spacing="3" filter="url(#glow)">PREMIUM ACCESS</text>
  <text x="640" y="648" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
    fill="#475569" text-anchor="middle" letter-spacing="2">Declassified Gov Data · DoD Videos · AARO Reports · Live Submissions</text>

  <!-- Corner accents -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="40" y1="40" x2="40" y2="100" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="1240" y1="40" x2="1180" y2="40" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="1240" y1="40" x2="1240" y2="100" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="40" y1="680" x2="100" y2="680" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="40" y1="680" x2="40" y2="620" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="1240" y1="680" x2="1180" y2="680" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="1240" y1="680" x2="1240" y2="620" stroke="#1e3a5f" stroke-width="1.5"/>
</svg>
