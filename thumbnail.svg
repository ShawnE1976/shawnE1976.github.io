<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1530"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1">
      <feGaussianBlur stdDeviation="4" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2">
      <feGaussianBlur stdDeviation="10" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgG)"/>
  <ellipse cx="300" cy="300" rx="280" ry="280" fill="url(#glowB)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.5">
    <circle cx="60" cy="60" r="1.2"/><circle cx="180" cy="40" r="0.9"/><circle cx="350" cy="55" r="1"/>
    <circle cx="500" cy="80" r="1.3"/><circle cx="550" cy="200" r="0.8"/><circle cx="40" cy="300" r="1"/>
    <circle cx="560" cy="400" r="0.9"/><circle cx="80" cy="500" r="1.1"/><circle cx="400" cy="550" r="0.8"/>
    <circle cx="520" cy="540" r="1"/><circle cx="250" cy="570" r="0.9"/><circle cx="100" cy="150" r="0.8"/>
  </g>

  <!-- Globe -->
  <circle cx="300" cy="300" r="180" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="300" cy="300" rx="180" ry="60" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="300" cy="300" rx="180" ry="120" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.15"/>
  <line x1="120" y1="300" x2="480" y2="300" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="300" y1="120" x2="300" y2="480" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="300" cy="300" rx="90" ry="180" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.15"/>

  <!-- Sighting dots -->
  <circle cx="240" cy="250" r="6" fill="#f59e0b" filter="url(#g1)"/>
  <circle cx="310" cy="230" r="5" fill="#ef4444" filter="url(#g1)"/>
  <circle cx="360" cy="270" r="8" fill="#00d4ff" filter="url(#g1)"/>
  <circle cx="280" cy="330" r="5" fill="#22c55e" filter="url(#g1)"/>
  <circle cx="340" cy="320" r="6" fill="#f59e0b" filter="url(#g1)"/>
  <circle cx="220" cy="310" r="4" fill="#00d4ff" filter="url(#g1)"/>
  <circle cx="380" cy="350" r="5" fill="#ef4444" filter="url(#g1)"/>

  <!-- Pulse rings -->
  <circle cx="360" cy="270" r="18" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="360" cy="270" r="28" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>

  <!-- Connection lines -->
  <line x1="240" y1="250" x2="310" y2="230" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="310" y1="230" x2="360" y2="270" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="280" y1="330" x2="340" y2="320" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>

  <!-- Title -->
  <text x="300" y="96" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900"
    fill="#00d4ff" text-anchor="middle" filter="url(#g2)" letter-spacing="4">PHENO</text>
  <text x="300" y="96" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900"
    fill="#00d4ff" text-anchor="middle" letter-spacing="4">PHENO</text>
  <text x="300" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900"
    fill="#7c3aed" text-anchor="middle" filter="url(#g2)" letter-spacing="4">MAP</text>
  <text x="300" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900"
    fill="#7c3aed" text-anchor="middle" letter-spacing="4">MAP</text>

  <!-- Bottom text -->
  <text x="300" y="520" font-family="'Segoe UI', Arial, sans-serif" font-size="15"
    fill="#94a3b8" text-anchor="middle" letter-spacing="3">UAP SIGHTING DATABASE</text>
  <text x="300" y="548" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
    fill="#475569" text-anchor="middle" letter-spacing="2">GLOBAL · VERIFIED · GOVERNMENT DATA</text>

  <!-- Corner accents -->
  <line x1="25" y1="25" x2="65" y2="25" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="25" y1="25" x2="25" y2="65" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="575" y1="25" x2="535" y2="25" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="575" y1="25" x2="575" y2="65" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="25" y1="575" x2="65" y2="575" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="25" y1="575" x2="25" y2="535" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="575" y1="575" x2="535" y2="575" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="575" y1="575" x2="575" y2="535" stroke="#1e3a5f" stroke-width="1.5"/>
</svg>
